<svg width="320" height="360" viewBox="0 0 320 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Initiate badge">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background kartu gelap -->
  <rect width="320" height="360" rx="24" fill="#1f1f1f"/>

  <!-- Lapisan hexagon dengan efek shadow -->
  <g filter="url(#shadow)">
    <polygon points="160,48 242,97 242,182 160,231 78,182 78,97" fill="#2d5f5f" opacity="0.18"/>
    <polygon points="160,58 232,103 232,177 160,222 88,177 88,103" fill="#d5fff5" stroke="#3db69f" stroke-width="12" stroke-linejoin="round"/>
    <polygon points="160,72 220,112 220,168 160,208 100,168 100,112" fill="#e8fff7"/>
  </g>

  <!-- Ikon tengah </> -->
  <text x="160" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="36" fill="#1c5e51" text-anchor="middle" font-weight="700">&lt;/&gt;</text>

  <!-- Label kecil di bawah hexagon -->
  <text x="160" y="232" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2b7f70" text-anchor="middle" opacity="0.75" font-weight="700">NOVICE</text>

  <!-- Judul utama -->
  <text x="160" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="700">Initiate</text>

  <!-- Level teks -->
  <text x="160" y="308" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#b8b8b8" text-anchor="middle" font-weight="600">LEVEL 1</text>
</svg>